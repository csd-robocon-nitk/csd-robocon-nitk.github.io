<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshooting | CRN</title>

    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: Helvetica, Verdana, Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 120px;
            margin-top: 50px;
            margin-bottom: 50px;
            font-family: Helvetica, Verdana, Arial;
        }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 95%;
            margin: 0 auto;
        }

        .row img {
            width: 30%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
        }

        @media (max-width: 800px) {
            h1 {
                font-size: 80px;
            }
            .row {
                flex-direction: column;
                gap: 30px;
            }
            .row img {
                width: 90%;
                max-height: 400px;
            }
        }

        @media (max-width: 450px) {
            h1 {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>

    <h1>Skill issue.</h1>

    <div class="row">
        <img src="hari.webp" alt="Hari 1">
        <img src="/images/skillissue.gif" alt="Skill Issue GIF">
        <img src="hari 2.jpeg" alt="Hari 2">
    </div>

</body>
</html>
